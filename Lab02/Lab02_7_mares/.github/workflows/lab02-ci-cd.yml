name: CI/CD Lab05 en Lab02 Spring Boot Docker

on:
  pull_request:
    branches:
      - main
    paths:
      - "Lab02/Lab02_7_mares/**"
      - ".github/workflows/lab02-ci-cd.yml"

  push:
    branches:
      - main
    paths:
      - "Lab02/Lab02_7_mares/**"
      - ".github/workflows/lab02-ci-cd.yml"

env:
  APP_DIR: Lab02/Lab02_7_mares
  IMAGE_REPOSITORY: lab02-7-mares

jobs:
  ci:
    name: Build, Test and Smoke Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give Maven wrapper permissions
        run: chmod +x mvnw

      - name: Run Mockito unit tests
        run: ./mvnw clean test

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          POSTGRES_DB=lab02_7_mares
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres123
          DB_URL=jdbc:postgresql://db:5432/lab02_7_mares
          DB_USER=postgres
          DB_PASSWORD=postgres123
          EOF

      - name: Build Docker containers
        run: docker compose build

      - name: Start Docker containers
        run: docker compose up -d

      - name: Smoke test with curl
        run: |
          for i in {1..12}; do
            if curl -f http://localhost:8080/health; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 5
          done
          echo "Smoke test failed"
          docker compose logs
          exit 1

      - name: Show Docker logs
        if: always()
        run: docker compose logs

      - name: Stop Docker containers
        if: always()
        run: docker compose down -v

  cd:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Lab02/Lab02_7_mares
          file: ./Lab02/Lab02_7_mares/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab02-7-mares:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lab02-7-mares:${{ github.sha }}